<svg width="780" height="480" viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    @keyframes cursor { 0%,100% { opacity:1; } 50% { opacity:0; } }
    @keyframes reveal { from { clip-path:inset(0 100% 0 0); } to { clip-path:inset(0 0% 0 0); } }

    .f0  { animation: fadeUp .5s ease 0.0s both; }
    .f1  { animation: fadeUp .5s ease 0.8s both; }
    .f2  { animation: fadeUp .5s ease 1.8s both; }
    .f3  { animation: fadeUp .6s ease 2.8s both; }
    .f4  { animation: fadeUp .4s ease 3.0s both; }
    .f5  { animation: fadeUp .4s ease 3.3s both; }
    .f6  { animation: fadeUp .4s ease 4.2s both; }
    .f7  { animation: fadeUp .4s ease 4.6s both; }
    .f8  { animation: fadeUp .4s ease 5.0s both; }
    .f9  { animation: fadeUp .4s ease 5.4s both; }
    .f10 { animation: fadeUp .4s ease 6.0s both; }
    .dot { animation: pulse .9s ease 2.0s infinite; }

    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; }
  </style>
  <clipPath id="card"><rect width="780" height="480" rx="14"/></clipPath>
</defs>

<!-- Card background -->
<rect width="780" height="480" fill="#0f172a" rx="14"/>
<g clip-path="url(#card)">

<!-- Header bar -->
<g class="f0">
  <rect width="780" height="54" fill="#1e293b"/>
  <rect y="53" width="780" height="1" fill="#334155"/>
  <!-- Logo dot -->
  <circle cx="26" cy="27" r="9" fill="#6366f1"/>
  <text x="26" y="31.5" fill="white" font-size="10" font-weight="700" text-anchor="middle">O</text>
  <!-- Name -->
  <text x="42" y="32" fill="#f1f5f9" font-size="15" font-weight="700">ORION</text>
  <!-- Tool count badge -->
  <rect x="108" y="16" width="68" height="22" rx="11" fill="#1e1b4b"/>
  <text x="142" y="31" fill="#818cf8" font-size="11" text-anchor="middle">⚙ 13 Tools</text>
  <!-- Shield button -->
  <rect x="608" y="15" width="74" height="24" rx="12" fill="#1c1917" stroke="#334155" stroke-width="1"/>
  <text x="645" y="31" fill="#94a3b8" font-size="11" text-anchor="middle">🛡 Shield</text>
  <!-- Reset -->
  <rect x="692" y="15" width="72" height="24" rx="12" fill="#1c1917" stroke="#334155" stroke-width="1"/>
  <text x="728" y="31" fill="#94a3b8" font-size="11" text-anchor="middle">↺ Reset</text>
</g>

<!-- User message bubble -->
<g class="f1">
  <rect x="360" y="72" width="400" height="54" rx="16" fill="#2563eb"/>
  <text x="560" y="94" fill="white" font-size="13" text-anchor="middle">Search for AI engineer jobs in Denver</text>
  <text x="560" y="112" fill="#bfdbfe" font-size="12" text-anchor="middle">and tell me the top result</text>
</g>

<!-- Thinking dots -->
<g class="f2">
  <rect x="20" y="142" width="100" height="34" rx="17" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <circle cx="52" cy="159" r="4" fill="#64748b" class="dot"/>
  <circle cx="70" cy="159" r="4" fill="#64748b" style="animation: pulse .9s ease 2.3s infinite;"/>
  <circle cx="88" cy="159" r="4" fill="#64748b" style="animation: pulse .9s ease 2.6s infinite;"/>
</g>

<!-- Tool call card -->
<g class="f3">
  <rect x="20" y="192" width="740" height="88" rx="10" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
  <rect x="20" y="192" width="740" height="30" rx="10" fill="#1e1b4b"/>
  <rect x="20" y="210" width="740" height="12" fill="#1e1b4b"/>
  <g class="f4">
    <rect x="32" y="200" width="96" height="18" rx="9" fill="#6366f1"/>
    <text x="80" y="213" fill="white" font-size="11" text-anchor="middle" class="mono">search_jobs</text>
    <text x="138" y="213" fill="#a5b4fc" font-size="11" class="mono">→ calling...</text>
  </g>
  <g class="f5">
    <text x="32" y="238" fill="#64748b" font-size="11" class="mono">input  </text>
    <text x="78" y="238" fill="#c4b5fd" font-size="11" class="mono">{ query: "AI engineer", location: "Denver", ats: "all" }</text>
    <text x="32" y="258" fill="#64748b" font-size="11" class="mono">result </text>
    <text x="78" y="258" fill="#86efac" font-size="11" class="mono">{ count: 5, jobs: [ "Snowflake", "Palantir", "Datadog"... ] }</text>
  </g>
</g>

<!-- Agent response bubble -->
<g class="f6">
  <rect x="20" y="296" width="700" height="152" rx="14" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="38" y="322" fill="#e2e8f0" font-size="13" font-weight="600">Found 5 AI Engineer positions in Denver:</text>
</g>
<g class="f7">
  <rect x="38" y="332" width="3" height="38" rx="2" fill="#6366f1"/>
  <text x="52" y="350" fill="#f1f5f9" font-size="12" font-weight="600">Snowflake — Senior AI/ML Engineer</text>
  <text x="52" y="367" fill="#94a3b8" font-size="11">$140k–$170k · Remote / Denver · Greenhouse · Apply ready</text>
</g>
<g class="f8">
  <rect x="38" y="378" width="3" height="38" rx="2" fill="#818cf8"/>
  <text x="52" y="396" fill="#f1f5f9" font-size="12" font-weight="600">Palantir — Forward Deployed AI Engineer</text>
  <text x="52" y="413" fill="#94a3b8" font-size="11">$160k–$200k · Denver On-site · Lever · Apply ready</text>
</g>
<g class="f9">
  <text x="38" y="436" fill="#64748b" font-size="11">Would you like me to apply to any of these? I can fill out the forms automatically.</text>
</g>

<!-- Model badge -->
<g class="f10">
  <rect x="20" y="452" width="162" height="20" rx="10" fill="#581c87"/>
  <text x="101" y="466" fill="#e9d5ff" font-size="10" text-anchor="middle" font-weight="600">⚡ OPUS · claude-opus-4-6</text>
</g>

</g>
</svg>
