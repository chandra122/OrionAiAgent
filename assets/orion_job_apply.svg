</g>
<g class="f7">
  <rect x="280" y="406" width="220" height="36" rx="8" fill="#1a7f37"/>
  <text x="390" y="429" fill="white" font-size="14" font-weight="600" text-anchor="middle">Submit Application</text>
</g>

<!-- Success overlay flash -->
<g class="f7" style="animation: fadeUp .6s ease 6.6s both; opacity:0;">
  <rect x="20" y="106" width="740" height="324" rx="10" fill="#f0fdf4" opacity="0.97"/>
  <circle cx="390" cy="240" r="48" fill="#22c55e"/>
  <polyline points="366,240 384,258 418,218" fill="none" stroke="white" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" class="chk"/>
  <text x="390" y="316" fill="#15803d" font-size="16" font-weight="700" text-anchor="middle">Application Submitted Successfully!</text>
  <text x="390" y="336" fill="#64748b" font-size="12" text-anchor="middle">Havenly · Machine Learning Engineer · Logged to applied_jobs.json</text>
  <text x="390" y="356" fill="#94a3b8" font-size="11" text-anchor="middle">Screenshot saved · Alert sent within 5s</text>
</g>

</g>
</svg>
