  <text x="52" y="189" fill="#111827" font-size="13">Chandra Sekhar</text>
  <text x="344" y="184" fill="#22c55e" font-size="16">✓</text>
</g>

<!-- Field: Last Name - filled -->
<g class="f2">
  <text x="400" y="162" fill="#374151" font-size="11" font-weight="600">Last Name *</text>
  <rect x="400" y="168" width="320" height="32" rx="6" fill="#f9fafb" stroke="#22c55e" stroke-width="2"/>
  <text x="412" y="189" fill="#111827" font-size="13">Bollineni</text>
  <text x="704" y="184" fill="#22c55e" font-size="16">✓</text>
