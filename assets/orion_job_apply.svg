<svg width="780" height="460" viewBox="0 0 780 460" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes typeIn {
      from { width:0; } to { width:100%; }
    }
    @keyframes fillBar {
      from { width:0; } to { width:220px; }
    }
    @keyframes check {
      0% { stroke-dashoffset: 30; opacity:0; }
      50% { opacity:1; }
      100% { stroke-dashoffset: 0; opacity:1; }
    }
    .h  { animation: fadeUp .4s ease 0.1s both; }
    .f0 { animation: fadeUp .5s ease 0.3s both; }
    .f1 { animation: fadeUp .4s ease 1.0s both; }
    .f2 { animation: fadeUp .4s ease 1.8s both; }
    .f3 { animation: fadeUp .4s ease 2.6s both; }
    .f4 { animation: fadeUp .4s ease 3.4s both; }
    .f5 { animation: fadeUp .4s ease 4.2s both; }
    .f6 { animation: fadeUp .5s ease 5.0s both; }
    .f7 { animation: fadeUp .6s ease 5.8s both; }
    .chk { stroke-dasharray:30; stroke-dashoffset:30; animation: check .6s ease 6.2s forwards; }
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Cascadia Code','Fira Code',monospace; }
  </style>
  <clipPath id="jc"><rect width="780" height="460" rx="14"/></clipPath>
</defs>

<rect width="780" height="460" fill="#0f172a" rx="14"/>
<g clip-path="url(#jc)">

<!-- Orion header -->
<g class="h">
  <rect width="780" height="50" fill="#1e293b"/>
  <rect y="49" width="780" height="1" fill="#334155"/>
  <circle cx="26" cy="25" r="9" fill="#6366f1"/>
  <text x="26" y="29.5" fill="white" font-size="10" font-weight="700" text-anchor="middle">O</text>
  <text x="42" y="30" fill="#f1f5f9" font-size="14" font-weight="700">ORION</text>
  <text x="390" y="30" fill="#94a3b8" font-size="11" text-anchor="middle">apply_job · Greenhouse ATS · Havenly Inc.</text>
  <!-- Live badge -->
  <circle cx="694" cy="25" r="5" fill="#22c55e"/>
  <text x="706" y="29" fill="#22c55e" font-size="11">LIVE</text>
</g>

<!-- Browser chrome bar -->
<g class="f0">
  <rect x="20" y="62" width="740" height="36" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <!-- Traffic lights -->
  <circle cx="42" cy="80" r="6" fill="#ef4444"/>
  <circle cx="62" cy="80" r="6" fill="#f59e0b"/>
  <circle cx="82" cy="80" r="6" fill="#22c55e"/>
  <!-- URL bar -->
  <rect x="100" y="68" width="560" height="24" rx="12" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="120" y="84" fill="#22c55e" font-size="10" class="mono">🔒</text>
  <text x="136" y="84" fill="#94a3b8" font-size="11" class="mono">boards.greenhouse.io/havenly/jobs/7304219002</text>
  <!-- Orion bot indicator -->
  <rect x="672" y="68" width="78" height="24" rx="12" fill="#1e1b4b"/>
  <text x="711" y="84" fill="#818cf8" font-size="10" text-anchor="middle">⚡ Orion filling</text>
</g>

<!-- Form area - left column -->
<rect x="20" y="106" width="740" height="324" rx="10" fill="#ffffff" class="f0"/>

<!-- Greenhouse logo + company -->
<g class="f0">
  <text x="40" y="134" fill="#1a7f37" font-size="14" font-weight="700">greenhouse</text>
  <text x="200" y="134" fill="#666" font-size="13">— Havenly · Machine Learning Engineer</text>
</g>

<!-- Field: First Name - filled -->
