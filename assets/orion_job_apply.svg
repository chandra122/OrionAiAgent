  <text x="52" y="249" fill="#111827" font-size="13">chandrasekhar090591@gmail.com</text>
  <text x="344" y="244" fill="#22c55e" font-size="16">✓</text>
</g>

<!-- Field: Phone - filled -->
<g class="f3">
  <text x="400" y="222" fill="#374151" font-size="11" font-weight="600">Phone</text>
  <rect x="400" y="228" width="320" height="32" rx="6" fill="#f9fafb" stroke="#22c55e" stroke-width="2"/>
  <text x="412" y="249" fill="#111827" font-size="13">+1 (303) 915-6458</text>
  <text x="704" y="244" fill="#22c55e" font-size="16">✓</text>
</g>

<!-- Field: LinkedIn - filled -->
<g class="f4">
  <text x="40" y="282" fill="#374151" font-size="11" font-weight="600">LinkedIn Profile</text>
  <rect x="40" y="288" width="680" height="32" rx="6" fill="#f9fafb" stroke="#22c55e" stroke-width="2"/>
  <text x="52" y="309" fill="#111827" font-size="13">https://linkedin.com/in/chandrasekharbollineni/</text>
  <text x="704" y="304" fill="#22c55e" font-size="16">✓</text>
</g>

<!-- Resume upload - filled -->
<g class="f5">
  <text x="40" y="342" fill="#374151" font-size="11" font-weight="600">Resume / CV *</text>
