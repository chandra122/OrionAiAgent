  <rect x="20" y="72" width="740" height="12" fill="#1e1b4b"/>
  <!-- Tool badge -->
  <rect x="32" y="60" width="88" height="18" rx="9" fill="#4338ca"/>
  <text x="76" y="73" fill="white" font-size="11" text-anchor="middle" class="mono">web_search</text>
  <!-- Model badge -->
  <rect x="630" y="60" width="118" height="18" rx="9" fill="#1e1b4b"/>
  <text x="689" y="73" fill="#818cf8" font-size="10" text-anchor="middle">sonnet · turn 1</text>
</g>
<g class="f2">
  <text x="36" y="102" fill="#64748b" font-size="11" class="mono">input   </text>
  <text x="84" y="102" fill="#c4b5fd" font-size="11" class="mono">{</text>
  <text x="96" y="102" fill="#a5b4fc" font-size="11" class="mono"> "query": </text>
  <text x="178" y="102" fill="#86efac" font-size="11" class="mono">"AI engineer jobs Denver 2025"</text>
  <text x="394" y="102" fill="#c4b5fd" font-size="11" class="mono">}</text>
  <text x="36" y="120" fill="#64748b" font-size="11" class="mono">latency </text>
  <text x="84" y="120" fill="#fcd34d" font-size="11" class="mono">1.24s</text>
  <text x="130" y="120" fill="#64748b" font-size="11" class="mono">|</text>
  <text x="144" y="120" fill="#64748b" font-size="11" class="mono">source </text>
  <text x="196" y="120" fill="#94a3b8" font-size="11" class="mono">DuckDuckGo (no API key)</text>
  <text x="400" y="120" fill="#64748b" font-size="11" class="mono">|</text>
  <text x="412" y="120" fill="#64748b" font-size="11" class="mono">results </text>
  <text x="464" y="120" fill="#86efac" font-size="11" class="mono">8 listings found</text>
</g>

<!-- Tool card: apply_job -->
<g class="f3">
  <rect x="20" y="154" width="740" height="108" rx="10" fill="#0c0a1e" stroke="#7c3aed" stroke-width="2"/>
  <rect x="20" y="154" width="740" height="32" rx="10" fill="#3b0764"/>
  <rect x="20" y="174" width="740" height="12" fill="#3b0764"/>
  <!-- Tool badge -->
  <rect x="32" y="162" width="74" height="18" rx="9" fill="#7c3aed"/>
  <text x="69" y="175" fill="white" font-size="11" text-anchor="middle" class="mono">apply_job</text>
  <!-- Risk badge -->
  <rect x="114" y="162" width="52" height="18" rx="9" fill="#450a0a"/>
  <text x="140" y="175" fill="#fca5a5" font-size="10" text-anchor="middle">HIGH RISK</text>
  <!-- Guardrail badge -->
  <rect x="174" y="162" width="100" height="18" rx="9" fill="#1c1917"/>
  <text x="224" y="175" fill="#f59e0b" font-size="10" text-anchor="middle">🛡 Audit logged</text>
  <!-- Model badge -->
  <rect x="630" y="162" width="118" height="18" rx="9" fill="#3b0764"/>
  <text x="689" y="175" fill="#e9d5ff" font-size="10" text-anchor="middle">opus · turn 2</text>
</g>
<g class="f4">
  <text x="36" y="204" fill="#64748b" font-size="11" class="mono">input   </text>
  <text x="84" y="204" fill="#c4b5fd" font-size="11" class="mono">{ url: </text>
  <text x="128" y="204" fill="#86efac" font-size="11" class="mono">"boards.greenhouse.io/havenly/jobs/7304219"</text>
  <text x="518" y="204" fill="#c4b5fd" font-size="11" class="mono">, company: "Havenly" }</text>
  <text x="36" y="222" fill="#64748b" font-size="11" class="mono">browser </text>
  <text x="84" y="222" fill="#fcd34d" font-size="11" class="mono">Chromium (headed) · Playwright sync API · thread executor</text>
  <text x="36" y="240" fill="#64748b" font-size="11" class="mono">fields  </text>
  <text x="84" y="240" fill="#86efac" font-size="11" class="mono">name ✓  email ✓  phone ✓  linkedin ✓  resume ✓  cover_letter ✓</text>
  <text x="36" y="258" fill="#64748b" font-size="11" class="mono">result  </text>
  <text x="84" y="258" fill="#86efac" font-size="11" class="mono">{ success: true, message: "Application submitted successfully." }</text>
</g>

<!-- Footer: total turns -->
<g class="f5">
  <line x1="20" y1="278" x2="760" y2="278" stroke="#1e293b" stroke-width="1"/>
  <text x="40" y="300" fill="#475569" font-size="11">Total turns: 2</text>
  <text x="160" y="300" fill="#475569" font-size="11">Tools called: 2</text>
  <text x="290" y="300" fill="#475569" font-size="11">Total latency: 8.4s</text>
  <text x="430" y="300" fill="#475569" font-size="11">Input tokens: 4,696</text>
  <text x="580" y="300" fill="#475569" font-size="11">Output tokens: 311</text>
  <text x="40" y="320" fill="#334155" font-size="10">Loop ended: stop_reason=end_turn after 2 iterations of max 50</text>
</g>

</g>
</svg>
