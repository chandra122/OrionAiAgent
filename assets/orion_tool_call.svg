<svg width="780" height="340" viewBox="0 0 780 340" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.2; } }
    .f0 { animation: fadeUp .4s ease 0.0s both; }
    .f1 { animation: fadeUp .5s ease 0.6s both; }
    .f2 { animation: fadeUp .4s ease 1.4s both; }
    .f3 { animation: fadeUp .4s ease 2.2s both; }
    .f4 { animation: fadeUp .4s ease 3.0s both; }
    .f5 { animation: fadeUp .5s ease 3.8s both; }
    .spin { animation: pulse .6s ease 1.0s 4; }
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Cascadia Code','Fira Code',monospace; }
  </style>
  <clipPath id="tc"><rect width="780" height="340" rx="14"/></clipPath>
</defs>

<rect width="780" height="340" fill="#0f172a" rx="14"/>
<g clip-path="url(#tc)">

<!-- Label top -->
<g class="f0">
  <text x="390" y="30" fill="#475569" font-size="12" text-anchor="middle">Tool Execution — Real-time trace</text>
  <line x1="40" y1="40" x2="740" y2="40" stroke="#1e293b" stroke-width="1"/>
</g>

<!-- Tool card: web_search -->
<g class="f1">
  <rect x="20" y="52" width="740" height="88" rx="10" fill="#0c0a1e" stroke="#6366f1" stroke-width="1.5"/>
