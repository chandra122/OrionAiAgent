<svg width="780" height="300" viewBox="0 0 780 300" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .c1 { animation: fadeUp .5s ease 0.2s both; }
    .c2 { animation: fadeUp .5s ease 0.6s both; }
    .c3 { animation: fadeUp .5s ease 1.0s both; }
    .b1 { animation: fadeUp .4s ease 1.4s both; }
    .b2 { animation: fadeUp .4s ease 1.7s both; }
    .b3 { animation: fadeUp .4s ease 2.0s both; }
    .a1 { animation: fadeUp .4s ease 2.4s both; }
    .a2 { animation: fadeUp .4s ease 2.7s both; }
    .a3 { animation: fadeUp .4s ease 3.0s both; }
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Cascadia Code', 'Fira Code', monospace; }
  </style>
  <clipPath id="rcard"><rect width="780" height="300" rx="14"/></clipPath>
</defs>

<rect width="780" height="300" fill="#0f172a" rx="14"/>
<g clip-path="url(#rcard)">

<!-- Title -->
<text x="390" y="36" fill="#94a3b8" font-size="12" text-anchor="middle" font-family="'Segoe UI', sans-serif">Intelligent Model Routing — Zero Latency Decision</text>
<line x1="40" y1="48" x2="740" y2="48" stroke="#1e293b" stroke-width="1"/>

<!-- Card 1: Haiku -->
<g class="c1">
  <rect x="24" y="60" width="228" height="210" rx="12" fill="#1e293b" stroke="#166534" stroke-width="1.5"/>
  <rect x="24" y="60" width="228" height="44" rx="12" fill="#14532d"/>
  <rect x="24" y="92" width="228" height="12" fill="#14532d"/>
  <text x="138" y="78" fill="#86efac" font-size="11" text-anchor="middle" font-weight="700">HAIKU TIER</text>
  <text x="138" y="92" fill="#4ade80" font-size="10" text-anchor="middle">claude-haiku-4-5</text>
</g>
<g class="b1">
  <text x="42" y="126" fill="#94a3b8" font-size="11">"What time is it?"</text>
  <text x="42" y="144" fill="#94a3b8" font-size="11">"List my tasks"</text>
  <text x="42" y="162" fill="#94a3b8" font-size="11">"What's 12 × 8?"</text>
  <line x1="42" y1="176" x2="234" y2="176" stroke="#334155" stroke-width="1"/>
  <text x="42" y="194" fill="#64748b" font-size="10">Tools active</text>
  <rect x="42" y="202" width="80" height="18" rx="9" fill="#14532d"/>
  <text x="82" y="215" fill="#86efac" font-size="10" text-anchor="middle">get_datetime</text>
  <rect x="130" y="202" width="56" height="18" rx="9" fill="#14532d"/>
  <text x="158" y="215" fill="#86efac" font-size="10" text-anchor="middle">calculate</text>
  <text x="42" y="250" fill="#64748b" font-size="10">Latency</text>
  <text x="140" y="250" fill="#86efac" font-size="11" font-weight="600">~0.8s</text>
  <text x="42" y="266" fill="#64748b" font-size="10">Cost</text>
  <text x="140" y="266" fill="#86efac" font-size="11" font-weight="600">Lowest</text>
</g>

<!-- Card 2: Sonnet -->
<g class="c2">
  <rect x="276" y="60" width="228" height="210" rx="12" fill="#1e293b" stroke="#3730a3" stroke-width="1.5"/>
  <rect x="276" y="60" width="228" height="44" rx="12" fill="#1e1b4b"/>
  <rect x="276" y="92" width="228" height="12" fill="#1e1b4b"/>
  <text x="390" y="78" fill="#a5b4fc" font-size="11" text-anchor="middle" font-weight="700">SONNET TIER</text>
  <text x="390" y="92" fill="#818cf8" font-size="10" text-anchor="middle">claude-sonnet-4-6</text>
</g>
<g class="b2">
  <text x="294" y="126" fill="#94a3b8" font-size="11">"Search the web for…"</text>
  <text x="294" y="144" fill="#94a3b8" font-size="11">"Read this file and…"</text>
  <text x="294" y="162" fill="#94a3b8" font-size="11">"What's in Denver?"</text>
  <line x1="294" y1="176" x2="486" y2="176" stroke="#334155" stroke-width="1"/>
  <text x="294" y="194" fill="#64748b" font-size="10">Tools active</text>
  <rect x="294" y="202" width="70" height="18" rx="9" fill="#1e1b4b"/>
  <text x="329" y="215" fill="#a5b4fc" font-size="10" text-anchor="middle">web_search</text>
  <rect x="372" y="202" width="64" height="18" rx="9" fill="#1e1b4b"/>
  <text x="404" y="215" fill="#a5b4fc" font-size="10" text-anchor="middle">read_file</text>
  <text x="294" y="250" fill="#64748b" font-size="10">Latency</text>
  <text x="392" y="250" fill="#a5b4fc" font-size="11" font-weight="600">~1.8s</text>
  <text x="294" y="266" fill="#64748b" font-size="10">Cost</text>
  <text x="392" y="266" fill="#a5b4fc" font-size="11" font-weight="600">Balanced</text>
</g>

<!-- Card 3: Opus -->
<g class="c3">
  <rect x="528" y="60" width="228" height="210" rx="12" fill="#1e293b" stroke="#6b21a8" stroke-width="1.5"/>
  <rect x="528" y="60" width="228" height="44" rx="12" fill="#3b0764"/>
  <rect x="528" y="92" width="228" height="12" fill="#3b0764"/>
  <text x="642" y="78" fill="#e9d5ff" font-size="11" text-anchor="middle" font-weight="700">OPUS TIER</text>
  <text x="642" y="92" fill="#c084fc" font-size="10" text-anchor="middle">claude-opus-4-6</text>
</g>
<g class="b3">
  <text x="546" y="126" fill="#94a3b8" font-size="11">"Write and run a script…"</text>
  <text x="546" y="144" fill="#94a3b8" font-size="11">"Apply to this job…"</text>
  <text x="546" y="162" fill="#94a3b8" font-size="11">"Schedule this task…"</text>
  <line x1="546" y1="176" x2="738" y2="176" stroke="#334155" stroke-width="1"/>
  <text x="546" y="194" fill="#64748b" font-size="10">Tools active</text>
  <rect x="546" y="202" width="66" height="18" rx="9" fill="#3b0764"/>
  <text x="579" y="215" fill="#e9d5ff" font-size="10" text-anchor="middle">run_python</text>
  <rect x="620" y="202" width="58" height="18" rx="9" fill="#3b0764"/>
  <text x="649" y="215" fill="#e9d5ff" font-size="10" text-anchor="middle">apply_job</text>
  <text x="546" y="250" fill="#64748b" font-size="10">Latency</text>
  <text x="644" y="250" fill="#c084fc" font-size="11" font-weight="600">~3.2s</text>
  <text x="546" y="266" fill="#64748b" font-size="10">Cost</text>
  <text x="644" y="266" fill="#c084fc" font-size="11" font-weight="600">Max quality</text>
</g>

<!-- Bottom label -->
<g class="a1">
  <text x="390" y="290" fill="#475569" font-size="10" text-anchor="middle">Decision made in &lt; 1ms · No extra API call · Rules-based routing</text>
</g>

</g>
</svg>
