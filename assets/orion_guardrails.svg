<svg width="780" height="360" viewBox="0 0 780 360" xmlns="http://www.w3.org/2000/svg">
<defs>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes flash { 0%,100% { opacity:1; } 50% { opacity:0.5; } }
    .h  { animation: fadeUp .4s ease 0.1s both; }
    .r0 { animation: fadeUp .4s ease 0.4s both; }
    .r1 { animation: fadeUp .4s ease 0.9s both; }
    .r2 { animation: fadeUp .4s ease 1.4s both; }
    .r3 { animation: fadeUp .4s ease 1.9s both; }
    .r4 { animation: fadeUp .4s ease 2.4s both; }
    .r5 { animation: fadeUp .4s ease 2.9s both; }
    .r6 { animation: fadeUp .4s ease 3.4s both; }
    .blink { animation: flash 1.5s ease 1.4s infinite; }
    text { font-family: 'Segoe UI', system-ui, sans-serif; }
    .mono { font-family: 'Cascadia Code','Fira Code',monospace; }
  </style>
  <clipPath id="gc"><rect width="780" height="360" rx="14"/></clipPath>
</defs>

<rect width="780" height="360" fill="#0f172a" rx="14"/>
<g clip-path="url(#gc)">

<!-- Header -->
<g class="h">
  <rect width="780" height="50" fill="#1e293b"/>
  <rect y="49" width="780" height="1" fill="#334155"/>
  <circle cx="26" cy="25" r="9" fill="#6366f1"/>
  <text x="26" y="29.5" fill="white" font-size="10" font-weight="700" text-anchor="middle">O</text>
  <text x="42" y="30" fill="#f1f5f9" font-size="14" font-weight="700">ORION</text>
  <!-- Shield badge active -->
  <rect x="608" y="13" width="80" height="24" rx="12" fill="#451a03" stroke="#d97706" stroke-width="1.5"/>
  <text x="648" y="29" fill="#fbbf24" font-size="11" text-anchor="middle" font-weight="600">🛡 Shield ●</text>
  <text x="390" y="32" fill="#94a3b8" font-size="11" text-anchor="middle">Guardrail Event Log — Last 7 events</text>
</g>

