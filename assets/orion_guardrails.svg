</g>

<!-- Stats footer -->
<g class="r6">
  <line x1="20" y1="318" x2="760" y2="318" stroke="#1e293b" stroke-width="1"/>
  <text x="40" y="340" fill="#64748b" font-size="11">Total events: 847</text>
  <text x="200" y="340" fill="#ef4444" font-size="11">Blocked: 12</text>
  <text x="320" y="340" fill="#22c55e" font-size="11">Allowed: 835</text>
  <text x="460" y="340" fill="#c084fc" font-size="11">Audit logged: 23</text>
