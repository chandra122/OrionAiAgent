<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orion</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #080808;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      padding: 12px 20px;
      background: rgba(15,15,15,0.95);
      border-bottom: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }
    .logo h1 {
      font-size: 15px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .header-right { display: flex; gap: 8px; align-items: center; }

    /* Tool dropdown */
    .tool-dropdown-wrap { position: relative; }

    .risk-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      margin-left: auto;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      font-weight: 600;
    }
    .risk-low    { background: rgba(16,185,129,0.12); color: #6ee7b7; }
    .risk-medium { background: rgba(251,191,36,0.12); color: #fcd34d; }
    .risk-high   { background: rgba(239,68,68,0.12);  color: #fca5a5; }

    #toolsBadge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      background: rgba(99,102,241,0.12);
      color: #a5b4fc;
      border: 1px solid rgba(99,102,241,0.25);
      cursor: pointer;
      user-select: none;
      transition: background 0.2s;
    }
    #toolsBadge:hover { background: rgba(99,102,241,0.22); }

    #toolsDropdown {
      display: none;
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #111;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 8px 0;
      min-width: 210px;
      z-index: 200;
      box-shadow: 0 16px 40px rgba(0,0,0,0.6);
    }
    #toolsDropdown.open { display: block; }

    .tool-dropdown-header {
      font-size: 10px;
      color: #444;
      padding: 4px 14px 8px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      display: flex;
      justify-content: space-between;
    }
    .tool-dropdown-header button {
      background: none; border: none;
      color: #a5b4fc; font-size: 10px; cursor: pointer;
    }
    .tool-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 14px; cursor: pointer;
      font-size: 12px; color: #bbb;
      transition: background 0.15s;
    }
    .tool-item:hover { background: #1a1a1a; }
    .tool-item input[type="checkbox"] {
      accent-color: #818cf8;
      width: 13px; height: 13px; cursor: pointer;
    }

    .hbtn {
      background: none;
      border: 1px solid #222;
      color: #888;
      padding: 5px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 11px;
      transition: border-color 0.2s, color 0.2s;
    }
    .hbtn:hover { border-color: #444; color: #ccc; }

    #voiceToggle {
      font-size: 17px; background: none; border: none;
      cursor: pointer; padding: 4px; opacity: 0.4;
      transition: opacity 0.2s;
    }
    #voiceToggle.on { opacity: 1; }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    .msg-wrap { display: flex; }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.agent { justify-content: flex-start; }

    .msg {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 13.5px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 20px rgba(79,70,229,0.3);
    }
    .msg.agent {
      background: #111;
      color: #ddd;
      border: 1px solid #1e1e1e;
      border-bottom-left-radius: 4px;
    }
    .msg.tool-call {
      background: rgba(16,185,129,0.07);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.15);
      font-size: 11.5px;
      font-family: "SF Mono", "Fira Code", monospace;
      padding: 7px 12px;
      border-radius: 8px;
    }
    .msg.error {
      background: rgba(239,68,68,0.08);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.15);
      font-size: 13px;
      border-radius: 10px;
    }
    .msg.guardrail {
      background: rgba(245,158,11,0.08);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,0.2);
      font-size: 12.5px;
      border-radius: 10px;
      font-family: "SF Mono", "Fira Code", monospace;
    }

    /* Model tier badge — shown below each agent response */
    .model-badge {
      font-size: 10px;
      color: #2a2a2a;
      margin-top: 4px;
      padding-left: 4px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .model-badge span {
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .model-badge .tier-haiku  { background: rgba(16,185,129,0.08); color: #4ade80; }
    .model-badge .tier-sonnet { background: rgba(99,102,241,0.10); color: #818cf8; }
    .model-badge .tier-opus   { background: rgba(168,85,247,0.10); color: #c084fc; }

    /* typing dots */
    .typing {
      display: flex; gap: 5px; align-items: center;
      padding: 14px 16px;
    }
    .typing span {
      width: 6px; height: 6px; border-radius: 50%;
      background: #333; animation: tdot 1.3s infinite;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes tdot {
      0%,80%,100% { background:#333; transform:translateY(0); }
      40% { background:#818cf8; transform:translateY(-5px); }
    }

    /* ── Image preview ── */
    #imagePreviewWrap {
      padding: 8px 20px 0;
      background: #0d0d0d;
      display: none;
    }
    #imagePreview { position: relative; display: inline-block; }
    #imagePreview img {
      height: 72px; border-radius: 8px;
      border: 1px solid #222; object-fit: cover;
    }
    #removeImage {
      position: absolute; top: -6px; right: -6px;
      background: #dc2626; color: #fff;
      border: none; border-radius: 50%;
      width: 17px; height: 17px; font-size: 10px;
      cursor: pointer; line-height: 17px; text-align: center; padding: 0;
    }

    /* ── Input bar ── */
    #inputbar {
      padding: 10px 16px 16px;
      background: #0d0d0d;
      border-top: 1px solid #161616;
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .round-btn {
      width: 40px; height: 40px; border-radius: 50%;
      border: 1px solid #1e1e1e;
      background: #111;
      color: #666; font-size: 16px;
      cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      flex-shrink: 0; transition: background 0.2s, color 0.2s, border-color 0.2s;
    }
    .round-btn:hover { background: #1a1a1a; color: #ccc; border-color: #333; }

    #micBtn.listening {
      background: #dc2626; color: #fff;
      border-color: #dc2626;
      animation: micpulse 1.5s infinite;
    }
    @keyframes micpulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.35); }
      50% { box-shadow: 0 0 0 8px rgba(220,38,38,0); }
    }

    #input {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 10px 14px;
      color: #e0e0e0;
      font-size: 13.5px;
      resize: none;
      min-height: 40px; max-height: 130px;
      outline: none; line-height: 1.5;
      transition: border-color 0.2s;
    }
    #input:focus { border-color: #4f46e5; }
    #input::placeholder { color: #333; }

    #sendBtn {
      width: 40px; height: 40px; border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff; font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(79,70,229,0.4);
      transition: opacity 0.2s, transform 0.1s;
    }
    #sendBtn:hover { opacity: 0.9; transform: scale(1.05); }
    #sendBtn:active { transform: scale(0.95); }
    #sendBtn:disabled { background: #1e1e1e; box-shadow: none; color: #333; cursor: not-allowed; transform: none; }

    #status {
      text-align: center; font-size: 11px;
      color: #333; padding: 3px 0 0;
      transition: color 0.3s;
    }
    #status.active { color: #6ee7b7; }

    /* glow on the page load */
    .glow-line {
      height: 1px;
      background: linear-gradient(90deg, transparent, #4f46e5 40%, #7c3aed 60%, transparent);
      opacity: 0.5;
    }
  </style>
</head>
<body>

<header id="header">
  <div class="logo">
    <div class="logo-icon">&#10022;</div>
    <h1>ORION</h1>
  </div>
  <div class="header-right">
    <div class="tool-dropdown-wrap">
      <span id="toolsBadge" onclick="toggleToolsDropdown()">0 tools</span>
      <div id="toolsDropdown">
        <div class="tool-dropdown-header">
          <span>Tools</span>
          <button onclick="toggleAllTools()">Toggle all</button>
        </div>
        <div id="toolsList"></div>
      </div>
    </div>
    <button class="hbtn" onclick="showTasks()">Tasks</button>
    <button class="hbtn" onclick="showGuardrails()" title="View guardrail event log">Shield</button>
    <button class="hbtn" onclick="resetSession()">Reset</button>
    <button id="voiceToggle" onclick="toggleVoice()">&#128266;</button>
  </div>
</header>
<div class="glow-line"></div>

<div id="messages">
  <div class="msg-wrap agent" style="opacity:0;animation:fadein 0.6s 0.2s forwards">
    <div class="msg agent">Hello! I am Orion, your AI agent. I can search the web, run code, check weather, schedule tasks, analyse images, and more. Type or use the mic to talk to me.</div>
  </div>
</div>

<div id="imagePreviewWrap">
  <div id="imagePreview">
    <img id="imageThumb" src="" alt="preview" />
    <button id="removeImage" onclick="clearImage()">x</button>
  </div>
</div>

<div id="inputbar">
  <button class="round-btn" id="micBtn" onclick="toggleMic()" title="Click to speak">&#127908;</button>
  <button class="round-btn" id="imgBtn" onclick="document.getElementById('fileInput').click()" title="Attach image">&#128247;</button>
  <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)" />
  <textarea id="input" placeholder="Ask Orion anything..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
</div>
<div id="status"></div>

<style>
  @keyframes fadein {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
  @keyframes slidein-left {
    from { opacity:0; transform:translateX(-14px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes slidein-right {
    from { opacity:0; transform:translateX(14px); }
    to   { opacity:1; transform:translateX(0); }
  }
  @keyframes popin {
    from { opacity:0; transform:scale(0.92); }
    to   { opacity:1; transform:scale(1); }
  }
  .anim-left  { animation: slidein-left  0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
  .anim-right { animation: slidein-right 0.28s cubic-bezier(0.22,1,0.36,1) forwards; }
  .anim-pop   { animation: popin         0.22s cubic-bezier(0.22,1,0.36,1) forwards; }
</style>

<script>
  // ── State ─────────────────────────────────────────────────────────────────
  const SESSION_ID  = "session_" + Math.random().toString(36).slice(2, 8);
  let voiceEnabled  = true;
  let isListening   = false;
  let isBusy        = false;
  let recognition   = null;
  let synth         = window.speechSynthesis;
  let pendingImage  = null;
  let allTools      = [];
  let activeTools   = new Set();
  let currentTier   = null;    // model tier for the current response

  // ── Init ──────────────────────────────────────────────────────────────────
  window.onload = () => {
    loadTools();
    setupSpeechRecognition();
    updateVoiceToggle();
    document.addEventListener("paste", (e) => {
      const item = [...e.clipboardData.items].find(i => i.type.startsWith("image/"));
      if (item) { e.preventDefault(); loadImageFile(item.getAsFile()); }
    });
    document.addEventListener("click", (e) => {
      if (!e.target.closest(".tool-dropdown-wrap"))
        document.getElementById("toolsDropdown").classList.remove("open");
    });
  };

  // ── Tools dropdown ────────────────────────────────────────────────────────
  let toolRiskLevels = {};

  async function loadTools() {
    try {
      const [toolsRes, rulesRes] = await Promise.all([
        fetch("/tools"),
        fetch("/guardrails/rules"),
      ]);
      const d = await toolsRes.json();
      const rules = await rulesRes.json();
      allTools      = d.tools;
      activeTools   = new Set(allTools);
      toolRiskLevels = rules.tool_risk_levels || {};
      renderToolsList();
      updateBadge();
    } catch(e) {
      document.getElementById("toolsBadge").textContent = "unavailable";
    }
  }

  function renderToolsList() {
    document.getElementById("toolsList").innerHTML = allTools.map(name => {
      const risk = toolRiskLevels[name] || "low";
      return `
      <label class="tool-item">
        <input type="checkbox" ${activeTools.has(name) ? "checked" : ""}
          onchange="toggleTool('${name}', this.checked)" />
        <span>${name}</span>
        <span class="risk-badge risk-${risk}">${risk}</span>
      </label>`;
    }).join("");
  }

  function toggleTool(name, checked) {
    checked ? activeTools.add(name) : activeTools.delete(name);
    updateBadge();
  }

  function toggleAllTools() {
    activeTools = activeTools.size === allTools.length ? new Set() : new Set(allTools);
    renderToolsList(); updateBadge();
  }

  function updateBadge() {
    document.getElementById("toolsBadge").textContent =
      activeTools.size + " / " + allTools.length + " tools";
  }

  function toggleToolsDropdown() {
    document.getElementById("toolsDropdown").classList.toggle("open");
  }

  // ── Image ─────────────────────────────────────────────────────────────────
  function handleFileSelect(e) {
    const f = e.target.files[0]; if (f) loadImageFile(f); e.target.value = "";
  }

  function loadImageFile(file) {
    if (!file || !file.type.startsWith("image/")) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      const dataUrl = e.target.result;
      pendingImage  = { data: dataUrl.split(",")[1], type: file.type };
      document.getElementById("imageThumb").src = dataUrl;
      document.getElementById("imagePreviewWrap").style.display = "block";
    };
    reader.readAsDataURL(file);
  }

  function clearImage() {
    pendingImage = null;
    document.getElementById("imageThumb").src = "";
    document.getElementById("imagePreviewWrap").style.display = "none";
  }

  // ── Send ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    const input = document.getElementById("input");
    const text  = input.value.trim();
    if ((!text && !pendingImage) || isBusy) return;

    if (pendingImage) {
      const wrap = addBubble(text || "(image)", "user");
      const img  = document.createElement("img");
      img.src    = document.getElementById("imageThumb").src;
      img.style  = "display:block;max-height:90px;border-radius:6px;margin-top:6px;";
      wrap.appendChild(img);
    } else {
      addBubble(text, "user");
    }

    const img = pendingImage;
    input.value = ""; autoResize(input); clearImage();
    await streamAgent(text, img);
  }

  function handleKey(e) {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function autoResize(el) {
    el.style.height = "auto";
    el.style.height = Math.min(el.scrollHeight, 130) + "px";
  }

  // ── Stream ────────────────────────────────────────────────────────────────
  async function streamAgent(message, image = null) {
    isBusy = true;
    setStatus("Orion is thinking...", true);
    document.getElementById("sendBtn").disabled = true;

    const typingEl = addTyping();
    let agentBubble = null;
    let agentWrap   = null;
    let fullText    = "";
    currentTier     = null;

    try {
      const res = await fetch("/chat/stream", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message:      message,
          session_id:   SESSION_ID,
          image_data:   image?.data  || null,
          image_type:   image?.type  || null,
          active_tools: [...activeTools],
        }),
      });

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let   buffer  = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop();

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const data = JSON.parse(line.slice(6));

          if (data.type === "model") {
            currentTier = data.tier;   // capture for badge rendering

          } else if (data.type === "tool") {
            typingEl.remove();
            addBubble("tool: " + data.name, "tool-call");
            addTyping();
            setStatus("Running: " + data.name, true);

          } else if (data.type === "text") {
            typingEl.remove();
            const isGuardrail = data.chunk.startsWith("[Guardrail]");
            if (!agentBubble) {
              const r = addBubbleWithWrap("", isGuardrail ? "guardrail" : "agent");
              agentBubble = r.div; agentWrap = r.wrap;
            }
            fullText += data.chunk;
            agentBubble.textContent = fullText;
            scrollBottom();

          } else if (data.type === "done") {
            typingEl.remove();
            if (!agentBubble) {
              const full = data.full || "(no response)";
              const isGuardrail = full.startsWith("[Guardrail]");
              const r = addBubbleWithWrap(full, isGuardrail ? "guardrail" : "agent");
              agentBubble = r.div; agentWrap = r.wrap;
              fullText = full;
            }
            // Attach model tier badge to the response wrap
            if (agentWrap && currentTier) {
              const badge = document.createElement("div");
              badge.className = "model-badge";
              badge.innerHTML = `<span class="tier-${currentTier}">${currentTier}</span>`;
              agentWrap.appendChild(badge);
            }
            if (voiceEnabled && fullText && !fullText.startsWith("[Guardrail]")) speak(fullText);

          } else if (data.type === "error") {
            typingEl.remove();
            addBubble("Error: " + data.message, "error");
          }
        }
      }
    } catch(e) {
      typingEl.remove();
      addBubble("Connection error: " + e.message, "error");
    }

    setStatus("", false);
    isBusy = false;
    document.getElementById("sendBtn").disabled = false;
  }

  // ── DOM helpers ───────────────────────────────────────────────────────────
  function addBubbleWithWrap(text, cls) {
    const messages = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (cls === "user" ? "user" : "agent");

    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;

    const animClass = cls === "user" ? "anim-right" : "anim-left";
    wrap.style.opacity = "";
    wrap.classList.add(animClass);
    wrap.appendChild(div);
    messages.appendChild(wrap);
    scrollBottom();
    return { div, wrap };
  }

  function addBubble(text, cls) {
    const messages = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap " + (cls === "user" ? "user" : "agent");

    const div = document.createElement("div");
    div.className = "msg " + cls;
    div.textContent = text;

    // spring-like animation
    const animClass = cls === "user" ? "anim-right" : "anim-left";
    wrap.style.opacity = "0";
    wrap.classList.add(animClass);
    wrap.style.opacity = "";

    wrap.appendChild(div);
    messages.appendChild(wrap);
    scrollBottom();
    return div;
  }

  function addTyping() {
    const messages = document.getElementById("messages");
    const wrap = document.createElement("div");
    wrap.className = "msg-wrap agent";
    wrap.dataset.typing = "1";
    const div = document.createElement("div");
    div.className = "msg agent typing";
    div.innerHTML = "<span></span><span></span><span></span>";
    wrap.appendChild(div);
    messages.appendChild(wrap);
    scrollBottom();
    return { remove: () => document.querySelectorAll("[data-typing]").forEach(e => e.remove()) };
  }

  function scrollBottom() {
    const m = document.getElementById("messages");
    m.scrollTop = m.scrollHeight;
  }

  function setStatus(text, active) {
    const s = document.getElementById("status");
    s.textContent = text;
    s.className   = active ? "active" : "";
  }

  // ── Voice input ───────────────────────────────────────────────────────────
  function setupSpeechRecognition() {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { document.getElementById("micBtn").style.opacity = "0.3"; return; }

    recognition = new SR();
    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = true;

    recognition.onresult = (e) => {
      const transcript = Array.from(e.results).map(r => r[0].transcript).join("");
      document.getElementById("input").value = transcript;
      autoResize(document.getElementById("input"));
      if (e.results[e.results.length - 1].isFinal) {
        stopListening();
        setTimeout(() => sendMessage(), 300);
      }
    };
    recognition.onend  = () => stopListening();
    recognition.onerror = () => stopListening();
  }

  function toggleMic() {
    if (!recognition) return;
    isListening ? stopListening() : startListening();
  }

  function startListening() {
    if (isBusy) return;
    synth.cancel();
    isListening = true;
    document.getElementById("micBtn").classList.add("listening");
    setStatus("Listening...", true);
    recognition.start();
  }

  function stopListening() {
    isListening = false;
    document.getElementById("micBtn").classList.remove("listening");
    setStatus("", false);
    try { recognition.stop(); } catch(e) {}
  }

  // ── Voice output ──────────────────────────────────────────────────────────
  function speak(text) {
    synth.cancel();
    const clean = text
      .replace(/#{1,6}\s/g, "").replace(/\*\*/g, "")
      .replace(/\*/g, "").replace(/`/g, "").replace(/\n+/g, ". ");
    const utt = new SpeechSynthesisUtterance(clean);
    utt.rate = 1.05; utt.pitch = 1.0;
    synth.speak(utt);
  }

  function toggleVoice() {
    voiceEnabled = !voiceEnabled;
    if (!voiceEnabled) synth.cancel();
    updateVoiceToggle();
  }

  function updateVoiceToggle() {
    const btn = document.getElementById("voiceToggle");
    btn.classList.toggle("on", voiceEnabled);
  }

  // ── Session / tasks ───────────────────────────────────────────────────────
  async function resetSession() {
    await fetch(`/session/reset?session_id=${SESSION_ID}`, { method: "POST" });
    document.getElementById("messages").innerHTML =
      '<div class="msg-wrap agent"><div class="msg agent anim-left">Session reset. Start a new conversation.</div></div>';
  }

  async function showTasks() {
    try {
      const r = await fetch("/tasks");
      const tasks = await r.json();
      if (!tasks.length) { addBubble("No scheduled tasks.", "agent"); return; }
      const lines = tasks.map(t =>
        `[${t.status.toUpperCase()}] ${t.task_id}\n  Action : ${t.action}\n  Run at : ${t.run_at}\n  Data   : ${t.data}${t.output ? "\n  Output : " + t.output.slice(0,120) : ""}`
      ).join("\n\n");
      addBubble(lines, "agent");
    } catch(e) { addBubble("Could not load tasks.", "error"); }
  }

  async function showGuardrails() {
    try {
      const r = await fetch("/guardrails");
      const events = await r.json();
      if (!events.length) {
        addBubble("[Guardrails] No events recorded yet.", "guardrail");
        return;
      }
      const blocked = events.filter(e => !e.allowed);
      const allowed = events.filter(e => e.allowed);
      let summary = `[Guardrail Log]  ${events.length} events  |  ${blocked.length} blocked  |  ${allowed.length} passed\n\n`;
      const recent = events.slice(-10).reverse();
      summary += recent.map(e =>
        `${e.allowed ? "PASS" : "BLOCK"}  ${e.event}  ${e.ts}\n  ${e.detail}`
      ).join("\n\n");
      addBubble(summary, "guardrail");
    } catch(e) { addBubble("Could not load guardrail log.", "error"); }
  }
</script>
</body>
</html>
